language = "C"
header = """/* sm121-kernels C API - Auto-generated by cbindgen. Do not edit.
 *
 * Thread safety: SparkCtx is NOT thread-safe. Each thread must use its own
 * SparkCtx handle obtained from spark_init(). Kernel launches on the same
 * handle are serialized on the associated CUDA stream.
 */"""
include_guard = "SPARK_KERNELS_H"
style = "Both"
cpp_compat = false

[defines]
"feature = c-api" = "SPARK_C_API"

[export]

[struct]
rename_fields = "SnakeCase"

[enum]
rename_variants = "ScreamingSnakeCase"
prefix_with_name = true
